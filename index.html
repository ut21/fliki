<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transformer Formal-Languages Wiki Entries</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        processEnvironments: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      },
      startup: {
        typeset: false
      }
    };
  </script>
  <script
    id="MathJax-script"
    async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js">
  </script>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.7;
      max-width: 980px;
      margin: 40px auto;
      padding: 0 20px;
      color: #222;
      background: #fff;
    }

    h1 {
      border-bottom: 2px solid #ddd;
      padding-bottom: 10px;
    }

    h2, h3 {
      margin-top: 36px;
    }

    code, pre {
      font-family: "SFMono-Regular", Consolas, Monaco, monospace;
    }

    pre {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
    }

    code {
      background: #f5f5f5;
      padding: 2px 4px;
      border-radius: 4px;
    }

    pre code {
      background: transparent;
      padding: 0;
    }

    ul {
      padding-left: 24px;
    }

    a {
      color: #0066cc;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin: 20px 0;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px 10px;
      vertical-align: top;
    }

    th {
      background: #f5f5f5;
    }

    blockquote {
      border-left: 4px solid #ddd;
      padding-left: 16px;
      color: #555;
      margin-left: 0;
    }

    

    .topbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #eee;
    }

    .topbar a, .topbar button {
      font: inherit;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fafafa;
      color: #222;
      padding: 6px 10px;
      cursor: pointer;
      text-decoration: none;
    }

    .topbar a:hover, .topbar button:hover {
      background: #f0f0f0;
      text-decoration: none;
    }

    .path {
      font-size: 0.95rem;
      color: #666;
      word-break: break-all;
    }

    .error {
      background: #fff3f3;
      border: 1px solid #ffd0d0;
      color: #8a1f1f;
      padding: 16px;
      border-radius: 8px;
    }

    .loading {
      color: #666;
    }

    .frontmatter {
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 12px 16px;
      margin: 16px 0 28px 0;
      color: #555;
      font-size: 0.95rem;
    }

    .frontmatter summary {
      cursor: pointer;
      color: #333;
      font-weight: 600;
    }

    .assumptions {
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 12px 16px;
      margin: 0 0 24px 0;
      background: #fbfbfb;
    }

    .assumptions-title {
      font-weight: 700;
      margin-bottom: 8px;
    }

    .assumption-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 8px;
    }

    .assumption-group-label {
      color: #555;
      font-size: 0.92rem;
      min-width: 112px;
    }

    .assumption-chip {
      display: inline-flex;
      align-items: center;
      border: 1px solid #d7e3f4;
      border-radius: 999px;
      background: #f4f8ff;
      color: #174f91;
      font-size: 0.9rem;
      line-height: 1.2;
      padding: 4px 9px;
      text-decoration: none;
    }

    .assumption-chip:hover {
      background: #eaf2ff;
      text-decoration: none;
    }

    .mathjax-display {
      margin: 1em 0;
      overflow-x: auto;
    }

    .home-directory {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
      margin-top: 28px;
    }

    .directory-column h2 {
      margin-top: 0;
      font-size: 1.05rem;
      border-bottom: 1px solid #eee;
      padding-bottom: 6px;
    }

    .directory-column ul {
      margin: 0;
      padding-left: 18px;
    }

    .directory-column li {
      margin: 4px 0;
      line-height: 1.35;
    }

    .directory-column a {
      word-break: break-word;
    }

    @media (max-width: 720px) {
      .home-directory {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <img src="flann-2.webp" alt="Flann Logo" style="height:100px; width:auto; border-radius:6px; margin-right:10px;" />
    <a href="./">Home</a>
    <a href="?page=indices/by_assumption.md">Assumptions</a>
    <a href="?page=indices/templates.md">Templates</a>
    <button id="backButton" type="button">Back</button>
    <span class="path" id="currentPath"></span>
  </div>

  <main id="content">
    <h1>Fliki: The FLaNN Wiki</h1>

    <p>
      This page renders Markdown entries client-side.
      Use the <a href="?page=indices/by_assumption.md">Assumptions</a>
      index to compare results by model, precision, attention, and normalization
      requirements.
      Use <a href="?page=indices/templates.md">Templates</a> when preparing a pull request.
    </p>

    <div id="homeDirectory" class="loading">Loading directory...</div>
  </main>

  <script>
    const content = document.getElementById("content");
    const currentPath = document.getElementById("currentPath");
    const backButton = document.getElementById("backButton");
    let assumptionIndexPromise = null;
    let currentMarkdownPath = "";

    marked.setOptions({
      gfm: true,
      breaks: false
    });

    backButton.addEventListener("click", () => {
      history.back();
    });

    function getPageFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get("page");
    }

    function normalizePath(path) {
      return path
        .replace(/^\.?\//, "")
        .replace(/\\/g, "/");
    }

    function dirname(path) {
      const normalized = normalizePath(path);
      const idx = normalized.lastIndexOf("/");
      return idx === -1 ? "" : normalized.slice(0, idx + 1);
    }

    function resolveRelativePath(baseFile, href) {
      if (!baseFile) return normalizePath(href);

      if (
        href.startsWith("http://") ||
        href.startsWith("https://") ||
        href.startsWith("#") ||
        href.startsWith("mailto:")
      ) {
        return href;
      }

      const baseDir = dirname(baseFile);
      const stack = baseDir.split("/").filter(Boolean);

      for (const part of href.split("/")) {
        if (!part || part === ".") continue;
        if (part === "..") stack.pop();
        else stack.push(part);
      }

      return stack.join("/");
    }

    function stripFrontmatter(markdown) {
      if (!markdown.startsWith("---")) {
        return { frontmatter: "", body: markdown };
      }

      const end = markdown.indexOf("\n---", 3);
      if (end === -1) {
        return { frontmatter: "", body: markdown };
      }

      const frontmatter = markdown.slice(3, end).trim();
      const body = markdown.slice(end + 4).replace(/^\s+/, "");
      return { frontmatter, body };
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function renderFrontmatter(frontmatter) {
      if (!frontmatter) return "";
      return `
        <details class="frontmatter">
          <summary>Metadata</summary>
          <pre><code>${escapeHtml(frontmatter)}</code></pre>
        </details>
      `;
    }

    async function loadAssumptionIndex() {
      if (!assumptionIndexPromise) {
        assumptionIndexPromise = fetch("indices/assumption_index.json", { cache: "no-cache" })
          .then((response) => response.ok ? response.json() : null)
          .catch(() => null);
      }

      return assumptionIndexPromise;
    }

    function parseScalarList(frontmatter, key) {
      const lines = frontmatter.split(/\r?\n/);
      const values = [];
      let active = false;

      for (const line of lines) {
        const topLevel = line.match(/^([A-Za-z0-9_-]+):/);
        if (topLevel) {
          active = topLevel[1] === key;
          continue;
        }

        if (active) {
          const item = line.match(/^  -\s+(.+)$/);
          if (item) values.push(item[1].trim().replace(/^["']|["']$/g, ""));
        }
      }

      return values;
    }

    function assumptionsFromFrontmatter(frontmatter, assumptionIndex) {
      const registry = assumptionIndex?.assumptions || {};
      const ids = parseScalarList(frontmatter, "assumptions");

      return ids.map((id) => {
        return registry[id] || {
          id,
          label: id,
          page: "",
          category: "uncategorized"
        };
      });
    }

    function renderAssumptionChip(assumption) {
      const label = escapeHtml(assumption.label || assumption.id);
      const category = assumption.category ? ` title="${escapeHtml(assumption.category)}"` : "";

      if (!assumption.page) {
        return `<span class="assumption-chip"${category}>${label}</span>`;
      }

      return `
        <a
          class="assumption-chip"
          href="?page=${encodeURIComponent(assumption.page)}"
          ${category}
        >${label}</a>
      `;
    }

    function renderAssumptionGroup(label, assumptions) {
      if (!assumptions || assumptions.length === 0) return "";

      return `
        <div class="assumption-group">
          <div class="assumption-group-label">${escapeHtml(label)}</div>
          ${assumptions.map(renderAssumptionChip).join("")}
        </div>
      `;
    }

    function renderAssumptions(path, assumptionIndex, frontmatter = "") {
      const page = assumptionIndex?.pages?.[path];
      if (!page && !frontmatter) return "";

      const groups = [];
      const sets = Object.values(page?.assumption_sets || {});

      if (page?.assumptions && page.assumptions.length > 0) {
        groups.push(renderAssumptionGroup(sets.length > 0 ? "Direct" : "Assumptions", page.assumptions));
      } else if (!page && frontmatter) {
        groups.push(renderAssumptionGroup("Assumptions", assumptionsFromFrontmatter(frontmatter, assumptionIndex)));
      }

      for (const set of sets) {
        groups.push(renderAssumptionGroup(set.label, set.assumptions));
      }

      if (groups.length === 0 && page?.effective_assumptions?.length > 0) {
        groups.push(renderAssumptionGroup("Assumptions", page.effective_assumptions));
      }

      if (groups.length === 0) return "";

      return `
        <section class="assumptions" aria-label="Assumptions">
          <div class="assumptions-title">Assumptions</div>
          ${groups.join("")}
        </section>
      `;
    }

    function protectMath(markdown) {
      const math = [];
      let output = "";
      let i = 0;
      let inFence = false;
      let inlineCode = false;

      while (i < markdown.length) {
        if (markdown.startsWith("```", i)) {
          inFence = !inFence;
          output += "```";
          i += 3;
          continue;
        }

        if (!inFence && markdown[i] === "`") {
          inlineCode = !inlineCode;
          output += markdown[i];
          i += 1;
          continue;
        }

        if (!inFence && !inlineCode && markdown.startsWith("$$", i)) {
          const end = markdown.indexOf("$$", i + 2);
          if (end !== -1) {
            const text = markdown.slice(i, end + 2);
            const token = `@@MATH_BLOCK_${math.length}@@`;
            math.push({ token, text, display: true });
            output += `\n\n${token}\n\n`;
            i = end + 2;
            continue;
          }
        }

        if (!inFence && !inlineCode && markdown[i] === "$" && markdown[i + 1] !== "$") {
          let j = i + 1;
          let found = -1;

          while (j < markdown.length) {
            if (markdown[j] === "\\") {
              j += 2;
              continue;
            }
            if (markdown[j] === "$") {
              found = j;
              break;
            }
            if (markdown[j] === "\n") break;
            j += 1;
          }

          if (found !== -1) {
            const text = markdown.slice(i, found + 1);
            const token = `@@MATH_INLINE_${math.length}@@`;
            math.push({ token, text, display: false });
            output += token;
            i = found + 1;
            continue;
          }
        }

        output += markdown[i];
        i += 1;
      }

      return { markdown: output, math };
    }

    function restoreMath(html, math) {
      let restored = html;

      for (const item of math) {
        const replacement = item.display
          ? `<div class="mathjax-display">${escapeHtml(item.text)}</div>`
          : `<span class="mathjax-inline">${escapeHtml(item.text)}</span>`;

        restored = restored.split(item.token).join(replacement);
      }

      return restored;
    }

    async function typesetMath() {
      if (!window.MathJax) return;

      if (MathJax.startup && MathJax.startup.promise) {
        await MathJax.startup.promise;
      }

      if (MathJax.typesetClear) {
        MathJax.typesetClear([content]);
      }

      if (MathJax.typesetPromise) {
        await MathJax.typesetPromise([content]);
      }
    }

    async function loadMarkdown(path, pushState = true) {
      const normalizedPath = normalizePath(path);
      currentMarkdownPath = normalizedPath;
      currentPath.textContent = normalizedPath;
      content.innerHTML = `<p class="loading">Loading ${escapeHtml(normalizedPath)}...</p>`;

      try {
        const response = await fetch(normalizedPath, { cache: "no-cache" });

        if (!response.ok) {
          throw new Error(`Could not fetch ${normalizedPath}: ${response.status} ${response.statusText}`);
        }

        const rawMarkdown = await response.text();
        const assumptionIndex = await loadAssumptionIndex();
        const { frontmatter, body } = stripFrontmatter(rawMarkdown);
        const protectedBody = protectMath(body);
        const renderedBody = marked.parse(protectedBody.markdown);

        content.innerHTML =
          renderFrontmatter(frontmatter) +
          renderAssumptions(normalizedPath, assumptionIndex, frontmatter) +
          restoreMath(renderedBody, protectedBody.math);

        rewriteLocalLinks(normalizedPath);
        await typesetMath();

        if (pushState) {
          const url = new URL(window.location);
          url.searchParams.set("page", normalizedPath);
          history.pushState({ page: normalizedPath }, "", url);
        }
      } catch (error) {
        content.innerHTML = `
          <div class="error">
            <strong>Failed to load Markdown.</strong>
            <p>${escapeHtml(error.message)}</p>
            <p>
              Check that the path exists in the published GitHub Pages site:
              <code>${escapeHtml(normalizedPath)}</code>
            </p>
          </div>
        `;
      }
    }

    function titleFromPath(path) {
      const file = path.split("/").pop().replace(/\.md$/, "");
      return file
        .split("_")
        .filter(Boolean)
        .map((part) => part[0]?.toUpperCase() + part.slice(1))
        .join(" ");
    }

    function directoryGroupForPath(path) {
      if (path.startsWith("objects/")) return "Objects";
      if (path.startsWith("constructions/")) return "Constructions";
      if (path.startsWith("results/")) return "Results";
      if (path.startsWith("examples/")) return "Examples";
      if (path.startsWith("indices/")) return "Indices";
      return "Root";
    }

    async function renderHomeDirectory() {
      currentMarkdownPath = "";
      currentPath.textContent = "";
      const container = document.getElementById("homeDirectory");
      if (!container) return;

      try {
        const response = await fetch("indices/site_index.json", { cache: "no-cache" });
        if (!response.ok) {
          throw new Error(`Could not load site index: ${response.status} ${response.statusText}`);
        }

        const siteIndex = await response.json();
        const groups = {
          Objects: [],
          Constructions: [],
          Results: [],
          Examples: [],
          Indices: [],
          Root: []
        };

        for (const rawPath of siteIndex.paths || []) {
          const path = normalizePath(rawPath);
          if (!path.endsWith(".md")) continue;

          groups[directoryGroupForPath(path)].push({
            path,
            label: titleFromPath(path)
          });
        }

        container.className = "home-directory";
        container.innerHTML = Object.entries(groups)
          .filter(([, pages]) => pages.length > 0)
          .map(([group, pages]) => `
            <section class="directory-column">
              <h2>${escapeHtml(group)}</h2>
              <ul>
                ${pages
                  .sort((a, b) => a.label.localeCompare(b.label))
                  .map((page) => `<li><a href="?page=${encodeURIComponent(page.path)}">${escapeHtml(page.label)}</a></li>`)
                  .join("")}
              </ul>
            </section>
          `)
          .join("");
      } catch (error) {
        container.className = "error";
        container.innerHTML = `
          <strong>Failed to load directory.</strong>
          <p>${escapeHtml(error.message)}</p>
        `;
      }
    }

    function rewriteLocalLinks(currentFile) {
      const links = content.querySelectorAll("a[href]");

      links.forEach((link) => {
        const rawHref = link.getAttribute("href");

        if (
          rawHref.startsWith("http://") ||
          rawHref.startsWith("https://") ||
          rawHref.startsWith("mailto:") ||
          rawHref.startsWith("?") ||
          rawHref.startsWith("#")
        ) {
          return;
        }

        const [pathPart, hashPart] = rawHref.split("#");
        const resolvedPath = resolveRelativePath(currentFile, pathPart);
        const hash = hashPart ? `#${hashPart}` : "";

        if (resolvedPath.endsWith(".md")) {
          link.setAttribute("href", `?page=${encodeURIComponent(resolvedPath)}${hash}`);
          link.addEventListener("click", async (event) => {
            event.preventDefault();
            await loadMarkdown(resolvedPath, true);

            if (hash) {
              const target = document.querySelector(hash);
              if (target) target.scrollIntoView();
            }
          });
        } else {
          link.setAttribute("href", resolvedPath + hash);
        }
      });
    }

    window.addEventListener("popstate", (event) => {
      const page = event.state?.page || getPageFromURL();
      if (page) {
        loadMarkdown(page, false);
      } else {
        renderHomeDirectory();
      }
    });

    window.addEventListener("DOMContentLoaded", () => {
      const page = getPageFromURL();
      if (page) {
        loadMarkdown(page, false);
      } else {
        renderHomeDirectory();
      }
    });
  </script>
</body>
</html>
