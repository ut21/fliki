<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fliki — The FLaNN Wiki</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        processEnvironments: true
      },
      options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] },
      startup: { typeset: false }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15px;
      line-height: 1.7;
      max-width: 980px;
      margin: 40px auto;
      padding: 0 20px 60px;
      color: #222;
      background: #fff;
    }

    body.wide { max-width: 1300px; }

    a { color: #0066cc; text-decoration: none; }
    a:hover { text-decoration: underline; }

    h1 { border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 18px; }
    h2 { margin-top: 36px; padding-bottom: 4px; border-bottom: 1px solid #eee; }
    h3 { margin-top: 24px; }

    code, pre { font-family: "SFMono-Regular", Consolas, Monaco, monospace; }
    pre { background: #f5f5f5; padding: 14px 16px; border-radius: 6px; overflow-x: auto; }
    code { background: #f5f5f5; padding: 2px 5px; border-radius: 4px; font-size: 0.9em; }
    pre code { background: transparent; padding: 0; font-size: inherit; }

    ul { padding-left: 24px; }
    li { margin: 3px 0; }
    blockquote { border-left: 4px solid #ddd; padding-left: 16px; color: #555; margin-left: 0; }

    table { border-collapse: collapse; width: 100%; margin: 20px 0; }
    th, td { border: 1px solid #ddd; padding: 8px 10px; vertical-align: top; }
    th { background: #f5f5f5; }

    .mathjax-display { margin: 1em 0; overflow-x: auto; }

    /* ── Topbar ──────────────────────────────────────────────────────── */
    .topbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid #eee;
    }
    .topbar img { height: 80px; width: auto; border-radius: 6px; margin-right: 4px; }

    .topbar a, .topbar button {
      font: inherit;
      font-size: 0.9rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fafafa;
      color: #222;
      padding: 5px 11px;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }
    .topbar a:hover, .topbar button:hover { background: #f0f0f0; text-decoration: none; }
    .topbar a.contribute { background: #0066cc; color: #fff; border-color: #0055aa; }
    .topbar a.contribute:hover { background: #0055aa; }

    .search-input {
      font: inherit;
      font-size: 0.9rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      color: #222;
      padding: 5px 11px;
      outline: none;
      min-width: 200px;
      margin-left: auto;
    }
    .search-input:focus { border-color: #0066cc; }
    .search-input::placeholder { color: #bbb; }

    .path { font-size: 0.85rem; color: #888; word-break: break-all; }

    /* ── Status ──────────────────────────────────────────────────────── */
    .error { background: #fff3f3; border: 1px solid #ffd0d0; color: #8a1f1f; padding: 16px; border-radius: 8px; }
    .loading { color: #888; font-style: italic; }
    .search-no-results { color: #888; font-style: italic; padding: 10px 0; }

    /* ── Infobox ─────────────────────────────────────────────────────── */
    .infobox {
      float: right;
      clear: right;
      margin: 4px 0 20px 28px;
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 0.88rem;
      line-height: 1.55;
      min-width: 210px;
      max-width: 280px;
    }
    .infobox-type {
      font-size: 0.78rem;
      font-weight: 700;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }
    .infobox-row { margin-bottom: 9px; }
    .infobox-row:last-child { margin-bottom: 0; }
    .infobox-label { color: #888; font-size: 0.8rem; margin-bottom: 2px; }
    .infobox-value { color: #222; }
    .infobox-divider { border: none; border-top: 1px solid #e5e5e5; margin: 10px 0; }
    .infobox .assumption-group { margin-top: 5px; }
    .infobox .assumption-group-label { font-size: 0.78rem; color: #888; min-width: 90px; }
    .infobox .assumption-chip {
      font-size: 0.78rem;
      padding: 2px 7px;
      margin: 1px 2px 1px 0;
    }

    /* ── Table of contents ───────────────────────────────────────────── */
    .toc {
      display: inline-block;
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 12px 20px 14px 16px;
      margin: 0 0 28px 0;
      min-width: 160px;
      max-width: 380px;
      font-size: 0.9rem;
    }
    .toc-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 7px; }
    .toc ol { margin: 0; padding-left: 18px; }
    .toc li { margin: 3px 0; }
    .toc .toc-h3 { list-style: none; margin-left: 10px; color: #888; }
    .toc .toc-h3::before { content: "– "; }

    /* ── Assumption chips ────────────────────────────────────────────── */
    .assumption-chip {
      display: inline-flex;
      align-items: center;
      border: 1px solid #d7e3f4;
      border-radius: 999px;
      background: #f4f8ff;
      color: #174f91;
      font-size: 0.88rem;
      line-height: 1.2;
      padding: 3px 9px;
      text-decoration: none;
    }
    .assumption-chip:hover { background: #eaf2ff; text-decoration: none; }
    .assumption-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 6px;
    }
    .assumption-group-label { color: #666; font-size: 0.88rem; min-width: 100px; }

    /* ── Edit link ───────────────────────────────────────────────────── */
    .edit-link {
      text-align: right;
      font-size: 0.8rem;
      color: #999;
      margin-top: 36px;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }
    .edit-link a { color: #0066cc; }

    /* ── Home directory ──────────────────────────────────────────────── */
    .home-directory {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
      margin-top: 28px;
    }
    .directory-column h2 {
      margin-top: 0;
      font-size: 1rem;
      border-bottom: 1px solid #eee;
      padding-bottom: 6px;
    }
    .directory-column ul { margin: 0; padding-left: 18px; }
    .directory-column li { margin: 4px 0; line-height: 1.4; }
    .directory-column a { word-break: break-word; }

    /* ── Editor ──────────────────────────────────────────────────────── */
    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      margin-top: 24px;
      align-items: start;
    }
    .editor-fields { display: flex; flex-direction: column; gap: 16px; }

    .field label { display: block; font-size: 0.88rem; font-weight: 700; color: #555; margin-bottom: 5px; }
    .field input[type="text"],
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 7px 10px;
      font: inherit;
      font-size: 0.9rem;
      background: #fff;
      color: #222;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none;
      border-color: #0066cc;
    }
    .field textarea { font-family: "SFMono-Regular", Consolas, monospace; resize: vertical; }

    /* Assumption chip toggles in editor */
    .chip-toggles { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip-toggle {
      border: 1px solid #d7e3f4;
      border-radius: 999px;
      background: #f4f8ff;
      color: #174f91;
      font-size: 0.85rem;
      padding: 3px 10px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s, color 0.1s;
    }
    .chip-toggle:hover { background: #eaf2ff; }
    .chip-toggle.on { background: #0066cc; color: #fff; border-color: #0055aa; }
    .chip-category-label { font-size: 0.78rem; color: #aaa; width: 100%; margin: 4px 0 1px; }

    .editor-actions { display: flex; gap: 8px; }
    .btn {
      font: inherit;
      font-size: 0.9rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fafafa;
      color: #222;
      padding: 6px 14px;
      cursor: pointer;
    }
    .btn:hover { background: #f0f0f0; }
    .btn.primary { background: #0066cc; color: #fff; border-color: #0055aa; }
    .btn.primary:hover { background: #0055aa; }

    .preview-col { position: sticky; top: 20px; }
    .preview-label { font-size: 0.8rem; font-weight: 700; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em; }
    .preview-pane {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 18px 20px;
      background: #fff;
      min-height: 180px;
      max-height: 62vh;
      overflow-y: auto;
      font-size: 0.93rem;
    }
    .raw-pane {
      margin-top: 14px;
      background: #f5f5f5;
      border-radius: 6px;
      padding: 10px 14px;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.76rem;
      white-space: pre;
      overflow-x: auto;
      max-height: 180px;
      overflow-y: auto;
    }

    .edit-notice {
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 6px;
    }
    .submit-guide {
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 0.88rem;
      color: #444;
    }
    .submit-guide ol { margin: 8px 0 0; padding-left: 18px; }
    .submit-guide li { margin: 5px 0; }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 720px) {
      .home-directory { grid-template-columns: 1fr; }
      .editor-grid { grid-template-columns: 1fr; }
      .infobox { float: none; margin: 0 0 20px 0; max-width: 100%; }
      .search-input { margin-left: 0; min-width: 140px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <img src="flann-2.webp" alt="Fliki" />
    <a href="./">Home</a>
    <a href="?page=indices/by_assumption.md">Assumptions</a>
    <a href="?page=indices/by_paper.md">Papers</a>
    <a href="?page=indices/templates.md">Templates</a>
    <button id="backButton" type="button">← Back</button>
    <span class="path" id="currentPath"></span>
    <a href="?editor" class="contribute">+ Contribute</a>
    <input id="searchInput" class="search-input" type="search" placeholder="Search entries…" aria-label="Search" />
  </div>

  <main id="content">
    <h1>Fliki: The FLaNN Wiki</h1>
    <p>
      A reference wiki for Formal Language and Neural Network expressivity results.
      Browse by <a href="?page=indices/by_assumption.md">assumptions</a>
      or <a href="?page=indices/by_paper.md">paper</a>,
      or use <a href="?page=indices/templates.md">templates</a> to contribute.
    </p>
    <div id="homeDirectory" class="loading">Loading…</div>
  </main>

  <script>
    // ── Globals ───────────────────────────────────────────────────────
    const content       = document.getElementById("content");
    const currentPathEl = document.getElementById("currentPath");
    const backButton    = document.getElementById("backButton");
    const searchInput   = document.getElementById("searchInput");

    let assumptionIndexPromise = null;
    let siteIndexPromise       = null;
    let currentMarkdownPath    = "";
    let editorDebounce         = null;

    marked.setOptions({ gfm: true, breaks: false });

    // ── URL ───────────────────────────────────────────────────────────
    function getParam(k) { return new URLSearchParams(window.location.search).get(k); }
    function hasParam(k) { return new URLSearchParams(window.location.search).has(k); }

    // ── Path utils ────────────────────────────────────────────────────
    function normalizePath(p) { return p.replace(/^\.?\//, "").replace(/\\/g, "/"); }
    function dirname(p) {
      const n = normalizePath(p), i = n.lastIndexOf("/");
      return i === -1 ? "" : n.slice(0, i + 1);
    }
    function resolveRelativePath(base, href) {
      if (!base) return normalizePath(href);
      if (/^(https?:|#|mailto:)/.test(href)) return href;
      const stack = dirname(base).split("/").filter(Boolean);
      for (const part of href.split("/")) {
        if (!part || part === ".") continue;
        part === ".." ? stack.pop() : stack.push(part);
      }
      return stack.join("/");
    }
    function titleFromPath(p) {
      return p.split("/").pop().replace(/\.md$/, "")
        .split("_").filter(Boolean)
        .map(s => s[0]?.toUpperCase() + s.slice(1)).join(" ");
    }
    function groupForPath(p) {
      if (p.startsWith("objects/"))       return "Objects";
      if (p.startsWith("constructions/")) return "Constructions";
      if (p.startsWith("results/"))       return "Results";
      if (p.startsWith("examples/"))      return "Examples";
      if (p.startsWith("indices/"))       return "Indices";
      return "Other";
    }

    // ── HTML ──────────────────────────────────────────────────────────
    function esc(t) {
      return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // ── Math ──────────────────────────────────────────────────────────
    function protectMath(md) {
      const math = []; let out = "", i = 0, fence = false, code = false;
      while (i < md.length) {
        if (md.startsWith("```", i)) { fence = !fence; out += "```"; i += 3; continue; }
        if (!fence && md[i] === "`") { code = !code; out += md[i++]; continue; }
        if (!fence && !code && md.startsWith("$$", i)) {
          const end = md.indexOf("$$", i + 2);
          if (end !== -1) {
            const tok = `@@MB${math.length}@@`;
            math.push({ token: tok, text: md.slice(i, end + 2), display: true });
            out += `\n\n${tok}\n\n`; i = end + 2; continue;
          }
        }
        if (!fence && !code && md[i] === "$" && md[i+1] !== "$") {
          let j = i + 1, found = -1;
          while (j < md.length) {
            if (md[j] === "\\") { j += 2; continue; }
            if (md[j] === "$") { found = j; break; }
            if (md[j] === "\n") break;
            j++;
          }
          if (found !== -1) {
            const tok = `@@MI${math.length}@@`;
            math.push({ token: tok, text: md.slice(i, found + 1), display: false });
            out += tok; i = found + 1; continue;
          }
        }
        out += md[i++];
      }
      return { markdown: out, math };
    }
    function restoreMath(html, math) {
      let out = html;
      for (const m of math) {
        const rep = m.display
          ? `<div class="mathjax-display">${esc(m.text)}</div>`
          : `<span class="mathjax-inline">${esc(m.text)}</span>`;
        out = out.split(m.token).join(rep);
      }
      return out;
    }
    async function typesetMath(el = content) {
      if (!window.MathJax) return;
      if (MathJax.startup?.promise) await MathJax.startup.promise;
      if (MathJax.typesetClear) MathJax.typesetClear([el]);
      if (MathJax.typesetPromise) await MathJax.typesetPromise([el]);
    }

    // ── Frontmatter ───────────────────────────────────────────────────
    function stripFrontmatter(raw) {
      if (!raw.startsWith("---")) return { frontmatter: "", body: raw };
      const end = raw.indexOf("\n---", 3);
      if (end === -1) return { frontmatter: "", body: raw };
      return { frontmatter: raw.slice(3, end).trim(), body: raw.slice(end + 4).replace(/^\s+/, "") };
    }
    function fmField(fm, key) {
      for (const line of fm.split(/\r?\n/)) {
        const m = line.match(new RegExp(`^${key}:\\s*(.+)$`));
        if (m) return m[1].trim().replace(/^["']|["']$/g, "");
      }
      return "";
    }
    function fmList(fm, key) {
      const vals = []; let active = false;
      for (const line of fm.split(/\r?\n/)) {
        const top = line.match(/^([A-Za-z0-9_-]+):/);
        if (top) { active = top[1] === key; continue; }
        if (active) {
          const item = line.match(/^  -\s+(.+)$/);
          if (item) vals.push(item[1].trim().replace(/^["']|["']$/g, ""));
        }
      }
      return vals;
    }
    function assumptionsFromFM(fm, idx) {
      const reg = idx?.assumptions || {};
      return fmList(fm, "assumptions").map(id => reg[id] || { id, label: id, page: "", category: "other" });
    }

    // ── Data loaders ──────────────────────────────────────────────────
    function loadAssumptionIndex() {
      if (!assumptionIndexPromise)
        assumptionIndexPromise = fetch("indices/assumption_index.json", { cache: "no-cache" })
          .then(r => r.ok ? r.json() : null).catch(() => null);
      return assumptionIndexPromise;
    }
    function loadSiteIndex() {
      if (!siteIndexPromise)
        siteIndexPromise = fetch("indices/site_index.json", { cache: "no-cache" })
          .then(r => r.ok ? r.json() : Promise.reject(new Error(r.status)));
      return siteIndexPromise;
    }

    // ── Assumption chip ───────────────────────────────────────────────
    function chip(a) {
      const label = esc(a.label || a.id);
      return a.page
        ? `<a class="assumption-chip" href="?page=${encodeURIComponent(a.page)}" title="${esc(a.category||'')}">${label}</a>`
        : `<span class="assumption-chip" title="${esc(a.category||'')}">${label}</span>`;
    }

    // ── Infobox ───────────────────────────────────────────────────────
    const CAT_ORDER = ["architecture","precision","attention","normalization",
                       "decoding","layer","embeddings","map","complexity","construction"];
    const TYPE_LABELS = {
      result:"Result", object:"Object", construction:"Construction", example:"Example",
      index:"Index", "model-definition":"Model definition",
      "model-assumption":"Model assumption", "attention-assumption":"Attention assumption"
    };

    function renderInfobox(fm, path, idx) {
      if (!fm) return "";
      const type   = fmField(fm, "type");
      const paper  = fmField(fm, "paper");
      const source = fmField(fm, "source");
      const label  = TYPE_LABELS[type] || type;

      const pageData = idx?.pages?.[path];
      const sets     = pageData?.assumption_sets ? Object.values(pageData.assumption_sets) : [];

      let assumptionHtml = "";
      if (sets.length > 0) {
        // Named assumption sets (e.g. lower bound / upper bounds)
        if (pageData.assumptions?.length) {
          assumptionHtml += groupRow("All", pageData.assumptions);
        }
        for (const s of sets) assumptionHtml += groupRow(s.label, s.assumptions || []);
      } else {
        const assumptions = pageData?.assumptions?.length
          ? pageData.assumptions
          : assumptionsFromFM(fm, idx);
        if (assumptions.length) {
          const byCat = {};
          for (const a of assumptions) (byCat[a.category||"other"] ||= []).push(a);
          const cats = [...CAT_ORDER.filter(c=>byCat[c]),
                        ...Object.keys(byCat).filter(c=>!CAT_ORDER.includes(c))];
          for (const cat of cats) {
            assumptionHtml += groupRow(cat[0].toUpperCase() + cat.slice(1), byCat[cat]);
          }
        }
      }

      if (!label && !paper && !source && !assumptionHtml) return "";

      return `<aside class="infobox" aria-label="Page info">
        ${label ? `<div class="infobox-type">${esc(label)}</div>` : ""}
        ${paper  ? `<div class="infobox-row"><div class="infobox-label">Paper</div><div class="infobox-value">${esc(paper)}</div></div>` : ""}
        ${source ? `<div class="infobox-row"><div class="infobox-label">Source</div><div class="infobox-value">${esc(source)}</div></div>` : ""}
        ${assumptionHtml ? `<hr class="infobox-divider">${assumptionHtml}` : ""}
      </aside>`;
    }

    function groupRow(label, assumptions) {
      if (!assumptions?.length) return "";
      return `<div class="assumption-group">
        <div class="assumption-group-label">${esc(label)}</div>
        ${assumptions.map(chip).join("")}
      </div>`;
    }

    // ── Table of contents ─────────────────────────────────────────────
    function addTOC(container) {
      const hs = [...container.querySelectorAll("h2, h3")];
      if (hs.length < 3) return;
      hs.forEach((h, i) => { h.id = `s${i}`; });
      const items = hs.map((h, i) => {
        const cls = h.tagName === "H3" ? " class=\"toc-h3\"" : "";
        return `<li${cls}><a href="#s${i}">${esc(h.textContent)}</a></li>`;
      }).join("");
      const toc = document.createElement("div");
      toc.className = "toc";
      toc.innerHTML = `<div class="toc-title">Contents</div><ol>${items}</ol>`;
      const first = container.querySelector("h2");
      if (first) first.parentNode.insertBefore(toc, first);
    }

    // ── Load markdown page ────────────────────────────────────────────
    async function loadMarkdown(path, pushState = true) {
      const p = normalizePath(path);
      currentMarkdownPath = p;
      currentPathEl.textContent = p;
      searchInput.value = "";
      document.body.classList.remove("wide");
      content.innerHTML = `<p class="loading">Loading…</p>`;

      try {
        const resp = await fetch(p, { cache: "no-cache" });
        if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}`);
        const raw = await resp.text();
        const idx = await loadAssumptionIndex();
        const { frontmatter, body } = stripFrontmatter(raw);
        const protected_ = protectMath(body);

        content.innerHTML =
          renderInfobox(frontmatter, p, idx) +
          restoreMath(marked.parse(protected_.markdown), protected_.math) +
          `<div class="edit-link"><a href="?editor&amp;edit=${encodeURIComponent(p)}">Edit this page</a></div>`;

        addTOC(content);
        rewriteLinks(p);
        await typesetMath(content);

        if (pushState) {
          const url = new URL(window.location);
          url.searchParams.set("page", p);
          url.searchParams.delete("editor");
          url.searchParams.delete("edit");
          history.pushState({ page: p }, "", url);
        }
      } catch (err) {
        content.innerHTML = `<div class="error"><strong>Could not load page.</strong><p>${esc(err.message)}</p><p>Path: <code>${esc(p)}</code></p></div>`;
      }
    }

    // ── Rewrite local links ───────────────────────────────────────────
    function rewriteLinks(base) {
      content.querySelectorAll("a[href]").forEach(link => {
        const href = link.getAttribute("href");
        if (/^(https?:|mailto:|#|\?)/.test(href)) return;
        const [pathPart, hashPart] = href.split("#");
        const resolved = resolveRelativePath(base, pathPart);
        const hash = hashPart ? `#${hashPart}` : "";
        if (resolved.endsWith(".md")) {
          link.href = `?page=${encodeURIComponent(resolved)}${hash}`;
          link.addEventListener("click", async e => {
            e.preventDefault();
            await loadMarkdown(resolved, true);
            if (hash) document.querySelector(hash)?.scrollIntoView();
          });
        } else {
          link.href = resolved + hash;
        }
      });
    }

    // ── Home directory ────────────────────────────────────────────────
    async function renderHomeDirectory(query = "") {
      currentMarkdownPath = "";
      currentPathEl.textContent = "";
      document.body.classList.remove("wide");

      content.innerHTML = `
        <h1>Fliki: The FLaNN Wiki</h1>
        <p>A reference wiki for Formal Language and Neural Network expressivity results.
        Browse by <a href="?page=indices/by_assumption.md">assumptions</a>
        or <a href="?page=indices/by_paper.md">paper</a>,
        or use <a href="?page=indices/templates.md">templates</a> to contribute.</p>
        <div id="homeDirectory" class="loading">Loading…</div>`;

      const container = document.getElementById("homeDirectory");
      try {
        const si = await loadSiteIndex();
        const q  = query.toLowerCase().trim();
        const groups = { Objects:[], Constructions:[], Results:[], Examples:[], Indices:[] };

        for (const rawPath of si.paths || []) {
          const p = normalizePath(rawPath);
          if (!p.endsWith(".md")) continue;
          const label = titleFromPath(p);
          if (q && !label.toLowerCase().includes(q) && !p.toLowerCase().includes(q)) continue;
          const g = groupForPath(p);
          if (groups[g]) groups[g].push({ path: p, label });
        }

        const filtered = Object.entries(groups).filter(([,ps]) => ps.length);
        if (!filtered.length && q) {
          container.className = "";
          container.innerHTML = `<p class="search-no-results">No entries matching <strong>${esc(query)}</strong>.</p>`;
          return;
        }

        container.className = "home-directory";
        container.innerHTML = filtered.map(([group, pages]) => `
          <section class="directory-column">
            <h2>${esc(group)}</h2>
            <ul>${pages.sort((a,b) => a.label.localeCompare(b.label))
              .map(p => `<li><a href="?page=${encodeURIComponent(p.path)}">${esc(p.label)}</a></li>`)
              .join("")}</ul>
          </section>`).join("");
      } catch (err) {
        container.className = "error";
        container.innerHTML = `<strong>Failed to load directory.</strong><p>${esc(err.message)}</p>`;
      }
    }

    // ── Editor ────────────────────────────────────────────────────────
    async function renderEditorPage(editFile = null) {
      currentMarkdownPath = "__editor__";
      currentPathEl.textContent = editFile ? `editing: ${editFile}` : "new page";
      document.body.classList.add("wide");

      const idx = await loadAssumptionIndex();
      const registry = idx?.assumptions || {};

      // Build chip toggles grouped by category
      const byCat = {};
      for (const [id, a] of Object.entries(registry)) {
        (byCat[a.category||"other"] ||= []).push({ id, ...a });
      }
      const cats = [...CAT_ORDER.filter(c=>byCat[c]),
                    ...Object.keys(byCat).filter(c=>!CAT_ORDER.includes(c))];

      const toggleHtml = cats.map(cat =>
        `<span class="chip-category-label">${esc(cat)}</span>` +
        (byCat[cat]||[]).map(a =>
          `<button type="button" class="chip-toggle" data-id="${esc(a.id)}">${esc(a.label)}</button>`
        ).join("")
      ).join("");

      content.innerHTML = `
        <h1>${editFile ? "Edit page" : "Contribute a page"}</h1>
        ${editFile ? `<div class="edit-notice">Editing <code>${esc(editFile)}</code> — download and save to this path in the repo.</div>` : ""}

        <div class="editor-grid">
          <div class="editor-fields">
            <div class="field">
              <label for="edType">Type</label>
              <select id="edType">
                <option value="result">Result</option>
                <option value="object">Object</option>
                <option value="model-definition">Model definition</option>
                <option value="model-assumption">Model assumption</option>
                <option value="attention-assumption">Attention assumption</option>
                <option value="construction">Construction</option>
                <option value="example">Example</option>
              </select>
            </div>
            <div class="field">
              <label for="edTitle">Title</label>
              <input id="edTitle" type="text" placeholder="e.g. Time Lower Bound" />
            </div>
            <div class="field">
              <label for="edPaper">Paper</label>
              <input id="edPaper" type="text" placeholder='e.g. Author, "Title", Venue Year' />
            </div>
            <div class="field">
              <label for="edSource">Source</label>
              <input id="edSource" type="text" placeholder="e.g. Section 3, Theorem 1" />
            </div>
            <div class="field">
              <label>Assumptions <span style="font-weight:normal;color:#aaa">(click to toggle)</span></label>
              <div class="chip-toggles" id="chipToggles">${toggleHtml}</div>
            </div>
            <div class="field">
              <label for="edBody">Body</label>
              <textarea id="edBody" rows="22"
                placeholder="# Title&#10;&#10;## Statement&#10;&#10;Write content here.&#10;LaTeX: $x^2$ or $$\\sum_i x_i$$"></textarea>
            </div>
            <div class="editor-actions">
              <button class="btn primary" id="edDownload">Download .md</button>
              <button class="btn" id="edCopy">Copy markdown</button>
            </div>
            <div class="submit-guide">
              <strong>How to submit</strong>
              <ol>
                <li>Fork the repository on GitHub.</li>
                <li>Save the <code>.md</code> file to the right directory (<code>objects/</code>, <code>results/</code>, etc.).</li>
                <li>Run <code>node scripts/build_site_index.mjs</code>.</li>
                <li>For results, run <code>node scripts/build_assumption_index.mjs</code>.</li>
                <li>Run <code>node scripts/build_paper_index.mjs</code>.</li>
                <li>Open a pull request.</li>
              </ol>
            </div>
          </div>

          <div class="preview-col">
            <div class="preview-label">Live preview</div>
            <div class="preview-pane" id="edPreview"></div>
            <div class="preview-label" style="margin-top:14px">Markdown output</div>
            <div class="raw-pane" id="edRaw"></div>
          </div>
        </div>`;

      // Chip toggle behaviour
      document.getElementById("chipToggles").addEventListener("click", e => {
        const btn = e.target.closest(".chip-toggle");
        if (btn) { btn.classList.toggle("on"); schedulePreview(); }
      });

      // Pre-fill when editing an existing page
      if (editFile) {
        try {
          const resp = await fetch(normalizePath(editFile), { cache: "no-cache" });
          if (resp.ok) {
            const raw = await resp.text();
            const { frontmatter, body } = stripFrontmatter(raw);
            const set = (id, v) => { const el=document.getElementById(id); if (el&&v) el.value=v; };
            set("edType",   fmField(frontmatter,"type"));
            set("edTitle",  fmField(frontmatter,"title"));
            set("edPaper",  fmField(frontmatter,"paper"));
            set("edSource", fmField(frontmatter,"source"));
            set("edBody",   body.trimStart());
            const ids = new Set(fmList(frontmatter,"assumptions"));
            document.querySelectorAll(".chip-toggle").forEach(btn => {
              if (ids.has(btn.dataset.id)) btn.classList.add("on");
            });
          }
        } catch {}
      }

      // Live updates
      ["edType","edTitle","edPaper","edSource","edBody"].forEach(id => {
        document.getElementById(id)?.addEventListener("input", schedulePreview);
      });

      document.getElementById("edDownload")?.addEventListener("click", () => {
        const md   = buildMd();
        const name = editFile ? editFile.split("/").pop()
          : (document.getElementById("edTitle")?.value||"page")
              .toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"") + ".md";
        const a = Object.assign(document.createElement("a"), {
          href: URL.createObjectURL(new Blob([md],{type:"text/markdown"})),
          download: name
        });
        a.click();
      });
      document.getElementById("edCopy")?.addEventListener("click", () => {
        navigator.clipboard.writeText(buildMd());
      });

      // Push state
      const url = new URL(window.location);
      url.searchParams.delete("page");
      url.searchParams.set("editor","1");
      editFile ? url.searchParams.set("edit",editFile) : url.searchParams.delete("edit");
      history.pushState({ editor:true, editFile }, "", url);

      schedulePreview();
    }

    function buildMd() {
      const type   = document.getElementById("edType")?.value  || "";
      const title  = document.getElementById("edTitle")?.value || "";
      const paper  = document.getElementById("edPaper")?.value || "";
      const source = document.getElementById("edSource")?.value|| "";
      const body   = document.getElementById("edBody")?.value  || "";
      const selected = [...document.querySelectorAll(".chip-toggle.on")].map(b => `  - ${b.dataset.id}`).join("\n");

      const lines = ["---", `title: ${title}`, `type: ${type}`];
      if (paper)    lines.push(`paper: ${paper}`);
      if (source)   lines.push(`source: ${source}`);
      if (selected) lines.push("assumptions:", selected);
      lines.push("---");
      return lines.join("\n") + "\n\n" + body;
    }

    function schedulePreview() {
      clearTimeout(editorDebounce);
      editorDebounce = setTimeout(updatePreview, 350);
    }

    async function updatePreview() {
      const preview = document.getElementById("edPreview");
      const rawEl   = document.getElementById("edRaw");
      if (!preview) return;
      const md = buildMd();
      if (rawEl) rawEl.textContent = md;
      const idx = await loadAssumptionIndex();
      const { frontmatter, body } = stripFrontmatter(md);
      const p_ = protectMath(body);
      preview.innerHTML =
        renderInfobox(frontmatter, "__editor__", idx) +
        restoreMath(marked.parse(p_.markdown), p_.math);
      await typesetMath(preview);
    }

    // ── Event handlers ────────────────────────────────────────────────
    backButton.addEventListener("click", () => history.back());

    searchInput.addEventListener("input", () => {
      const q = searchInput.value;
      if (currentMarkdownPath && q) {
        const url = new URL(window.location);
        url.searchParams.delete("page");
        history.pushState({}, "", url);
      }
      renderHomeDirectory(q);
    });

    window.addEventListener("popstate", e => {
      if (e.state?.editor) renderEditorPage(e.state.editFile || null);
      else {
        const page = e.state?.page || getParam("page");
        page ? loadMarkdown(page, false) : renderHomeDirectory();
      }
    });

    window.addEventListener("DOMContentLoaded", () => {
      if (hasParam("editor")) renderEditorPage(getParam("edit") || null);
      else {
        const page = getParam("page");
        page ? loadMarkdown(page, false) : renderHomeDirectory();
      }
    });
  </script>
</body>
</html>
